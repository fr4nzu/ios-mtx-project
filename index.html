<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>MT5 Premium iOS Replica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />

  <!-- External libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body style="margin: 0px;">
  <div id="mt5-app-wrapper">
    <div id="mt5-app">
      
      <div class="ios-status-bar">
        <div class="time" id="clock-time">23:08</div>
        <div class="icons-group">
          <div class="icon">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor">
              <rect x="0.5" y="7.5" width="2.8" height="4.5" rx="1.4" />
              <rect x="5.2" y="5" width="2.8" height="7" rx="1.4" />
              <rect x="9.9" y="2.5" width="2.8" height="9.5" rx="1.4" />
              <rect x="14.6" y="0" width="2.8" height="12" rx="1.4" />
            </svg>
          </div>
          <div class="icon" style="margin-right: 2px;">
            <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
              <path d="M1.5 3.5C5.5 -0.3 11.5 -0.3 15.5 3.5" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" />
              <path d="M4.5 7C6.8 4.8 10.2 4.8 12.5 7" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" />
              <circle cx="8.5" cy="10.5" r="1.5" fill="currentColor" />
            </svg>
          </div>
          <div class="battery-wrapper">
            <div class="battery-pill">
              <div class="battery-fill" id="bat-fill" style="width: 100%;"></div>
              <div class="battery-text" id="bat-txt">100</div>
            </div>
            <div class="battery-nub"></div>
          </div>
        </div>
      </div>

      <div class="top-nav-container">
        <button class="icon-unit">
          <svg class="svg-asset" viewBox="0 0 24 24">
            <path d="M4 8l3-3 3 3" />
            <path d="M7 5v14" />
            <path d="M4 16l3 3 3-3" />
            <path d="M14 7h6" />
            <path d="M14 12h6" />
            <path d="M14 17h6" />
          </svg>
        </button>
        <div class="glass-nav">
          <div class="glider" id="pill"></div>
          <button class="nav-btn active" onclick="slideTo(0, this)">ポジション</button>
          <button class="nav-btn" onclick="slideTo(1, this)">オーダー</button>
          <button class="nav-btn" onclick="slideTo(2, this)">約定</button>
        </div>
        <button class="icon-unit">
          <svg class="svg-asset" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9" />
            <path d="M12 7v5l3 2" />
          </svg>
        </button>
      </div>

      <div class="trade-list-container" id="list-container">
        <div id="trades-wrapper"></div>
        <div class="summary-box">
          <div class="sum-row"><span>入金</span><span id="sum-dep">550 000</span></div>
          <div class="sum-row"><span>損益</span><span id="sum-prof">-549 856</span></div>
          <div class="sum-row"><span>スワップ</span><span id="sum-swap">0</span></div>
          <div class="sum-row"><span>手数料</span><span id="sum-com">0</span></div>
          <div class="sum-row"><span>残高</span><span id="sum-bal">144</span></div>
        </div>
      </div>

      <div class="bottom-floating-pill">
        <div class="bottom-nav-item">
          <svg class="custom-icon" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 60 75 L 60 155 M 30 125 L 60 155 L 90 125" />
            <path d="M 140 125 L 140 45 M 110 75 L 140 45 L 170 75" />
          </svg>
          気配値
        </div>
        <div class="bottom-nav-item">
          <svg class="custom-icon" viewBox="0 0 200 200">
            <g>
              <line y1="40" y2="56" stroke="currentColor" stroke-width="12" stroke-linecap="butt" x2="120" x1="120"></line>             
              <line x1="120" y1="132" x2="120" y2="160" stroke="currentColor" stroke-width="12" stroke-linecap="butt"></line>          
              <rect x="104" y="60" width="32" height="72" rx="0" fill="none" stroke="currentColor" stroke-width="12"></rect>
            </g>
            <g>
              <line x1="60" y1="36" x2="60" y2="172" stroke="currentColor" stroke-width="12" stroke-linecap="round"></line>
              <rect x="38" y="75" width="44" height="76" rx="0" fill="currentColor"></rect>
            </g>
          </svg>
          チャート
        </div>
        <div class="bottom-nav-item">
          <svg class="custom-icon" viewBox="0 0 200 200">
            <rect x="25" y="25" width="150" height="150" rx="20" fill="none" stroke="currentColor" stroke-width="14" />
            <path d="M 48 128 L 88 88 L 116 116 L 152 64" fill="none" stroke="currentColor" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          トレード
        </div>
        <div class="bottom-nav-item active">
          <svg class="custom-icon" viewBox="0 0 200 200">
            <g stroke="currentColor" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none">
              <path d="M 68 156 A 65 65 0 1 0 35 100" />
              <path d="M 15 80 L 35 100 L 55 80" />
              <path d="M 100 64 L 100 100 L 120 120" />
            </g>
          </svg>
          履歴
        </div>
        <div class="bottom-nav-item" onclick="openSettings()">
          <svg class="custom-icon" viewBox="0 0 200 200">
            <g fill="none" stroke="currentColor" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
              <circle cx="100" cy="100" r="22" />
              <path d="M 88.4 56.5 L 88.7 36 A 65 65 0 0 1 111.3 36 L 111.6 56.5 A 45 45 0 0 1 131.8 68.2 L 149.8 58.2 A 65 65 0 0 1 161.1 77.8 L 143.5 88.4 A 45 45 0 0 1 143.5 111.6 L 161.1 122.2 A 65 65 0 0 1 149.8 141.8 L 131.8 131.8 A 45 45 0 0 1 111.6 143.5 L 111.3 164 A 65 65 0 0 1 88.7 164 L 88.4 143.5 A 45 45 0 0 1 68.2 131.8 L 50.2 141.8 A 65 65 0 0 1 38.9 122.2 L 56.5 111.6 A 45 45 0 0 1 56.5 88.4 L 38.9 77.8 A 65 65 0 0 1 50.2 58.2 L 68.2 68.2 A 45 45 0 0 1 88.4 56.5 Z" />
            </g>
          </svg>
          設定
        </div>
      </div>

      <div class="modal-overlay" id="edit-modal" data-html2canvas-ignore="true">
        <div class="modal-box">
          <h3 style="margin-top:0; text-align:center;">トレード編集</h3>
          <input type="hidden" id="edit-id">
          <div class="flex-2">
            <div>
              <label>通貨ペア</label>
              <input type="text" id="e-sym">
            </div>
            <div>
              <label>種別</label>
              <select id="e-type">
                <option value="buy">buy</option>
                <option value="sell">sell</option>
                <option value="balance">Balance</option>
              </select>
            </div>
          </div>
          <div class="flex-2">
            <div>
              <label>ロット</label>
              <input type="text" id="e-lot">
            </div>
            <div>
              <label>損益</label>
              <input type="number" id="e-profit">
            </div>
          </div>
          <div class="flex-2">
            <div>
              <label>エントリー価格</label>
              <input type="text" id="e-entry">
            </div>
            <div>
              <label>決済価格</label>
              <input type="text" id="e-close">
            </div>
          </div>
          <label>時間</label>
          <input type="text" id="e-time">
          <label>サイドカラー (SL/TP)</label>
          <select id="e-bar">
            <option value="none">なし (None)</option>
            <option value="tp">緑 (Green)</option>
            <option value="sl">赤 (Red)</option>
            <option value="blue-bar">青 (Blue)</option>
          </select>
          <button class="btn btn-blue" onclick="saveEdit()">💾 保存する (Save)</button>
          <button class="btn btn-red" onclick="deleteTrade()">🗑️ このトレードを削除</button>
          <button class="btn btn-dark" style="margin-bottom:0;" onclick="closeModals()">❌ キャンセル</button>
        </div>
      </div>

      <div class="modal-overlay" id="settings-modal" data-html2canvas-ignore="true">
        <div class="modal-box">
          <h3 style="margin-top:0; text-align:center; margin-bottom:15px;">設定メニュー</h3>
          
          <button class="btn btn-blue" style="margin-bottom:20px;" onclick="addNewTrade()">➕ 新しいトレードを作成</button>
          
          <div class="flex-2">
            <div>
              <label>バッテリー残量(%)</label>
              <input type="number" id="s-bat" value="100" onchange="updateBattery()">
            </div>
          </div>
          
          <div style="border-top: 1px solid #333; margin-bottom: 15px;"></div>
          <label style="color:var(--blue-color); text-align:center; font-size:14px;">手動サマリー設定</label>
          
          <div class="flex-2">
            <div>
              <label>入金 (Deposit)</label>
              <input type="text" id="s-dep" value="179 026" oninput="updateSummary()">
            </div>
            <div>
              <label>損益 (Profit)</label>
              <input type="text" id="s-prof" value="-28 485" oninput="updateSummary()">
            </div>
          </div>
          <div class="flex-2">
            <div>
              <label>スワップ (Swap)</label>
              <input type="text" id="s-swap" value="0" oninput="updateSummary()">
            </div>
            <div>
              <label>手数料 (Comms)</label>
              <input type="text" id="s-com" value="0" oninput="updateSummary()">
            </div>
          </div>
          <label>残高 (Balance)</label>
          <input type="text" id="s-bal" value="150 541" oninput="updateSummary()">
          
          <div style="border-top: 1px solid #333; margin-bottom: 15px; margin-top:5px;"></div>
          
          <button class="btn btn-gray" id="theme-toggle-btn" onclick="toggleTheme()" style="margin-bottom: 10px;">☀️ ライトモードに切替</button>
          <button class="btn btn-green" onclick="generatePNG()">📸 PNG画像を出力</button>
          <button class="btn btn-dark" style="margin-bottom:0;" onclick="closeModals()">❌ 閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
